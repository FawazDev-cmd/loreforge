services:
  loreforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: loreforge:latest
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      LOREFORGE_API_HOST: 0.0.0.0
      LOREFORGE_API_PORT: 8000
    ports:
      - "${LOREFORGE_API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/ready', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - loreforge

networks:
  loreforge:
    driver: bridge
